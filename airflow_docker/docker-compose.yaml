x-airflow-common: &airflow-common
  build:
    context: .
  image: airflow-custom:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    AIRFLOW__LOGGING__LOGGING_LEVEL: "INFO"
    DATA_BASE: "/opt/project/data"
    AIRFLOW_CONN_SPARK_DEFAULT: "spark://spark-master:7077"
    PYTHONPATH: "/opt/project"

  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ..:/opt/project

  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 10
      timeout: 5s

  airflow-init:
    env_file:
      - .env
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command: >
      -lc "
      set -e;
      airflow db migrate;
      airflow connections create-default-connections;
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true;
      "
    restart: "no"

  airflow-webserver:
    env_file:
      - .env
    <<: *airflow-common
    container_name: airflow-webserver
    command: bash -c "exec airflow webserver"
    ports:
      - "8082:8080"
      - "8000:8000"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  airflow-scheduler:
    env_file:
      - .env
    <<: *airflow-common
    container_name: airflow-scheduler
    command: bash -c "exec airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    image: apache/spark:3.5.1
    container_name: airflow-spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
      --host spark-master --port 7077 --webui-port 8080
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ..:/opt/project
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro

  spark-worker:
    image: apache/spark:3.5.1
    container_name: airflow-spark-worker
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ..:/opt/project
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro

  hive-metastore-db:
    image: postgres:15
    container_name: hive-metastore-db
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 5s
      retries: 20
      timeout: 5s

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    depends_on:
      hive-metastore-db:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    ports:
      - "9083:9083"
    volumes:
      - ..:/opt/project
      - ./jars/postgresql-42.7.3.jar:/opt/hive/lib/postgresql.jar:ro

  hive-server2:
    image: apache/hive:4.0.0
    container_name: hive-server2
    depends_on:
      - hive-metastore
    environment:
      SERVICE_NAME: hiveserver2
      HIVE_METASTORE_URIS: thrift://hive-metastore:9083
    ports:
      - "10000:10000"
    volumes:
      - ..:/opt/project
      - ./jars/postgresql-42.7.3.jar:/opt/hive/lib/postgresql.jar:ro
      
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: airflow-zookeeper
    environment:
     ZOOKEEPER_CLIENT_PORT: 2181
     ZOOKEEPER_TICK_TIME: 2000

        

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: airflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT


volumes:
  postgres-db-volume: